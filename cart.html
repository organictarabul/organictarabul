<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>কার্ট - অর্গানিক শপ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">অর্গানিক শপ</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">প্রধান পাতা</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="cart.html">কার্ট <span id="cart-count" class="badge text-bg-secondary"></span></a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-4">
    <h2>আপনার কার্ট</h2>
    <div id="cart-container">
      <!-- Cart items will be injected here -->
    </div>
  </main>
  <footer class="bg-light text-center py-3 border-top">
    <p class="mb-0">&copy; <span id="year"></span> অর্গানিক শপ. সর্বস্বত্ব সংরক্ষিত।</p>
  </footer>

  <!-- Hidden admin link positioned bottom left -->
  <div id="adminLink" style="position: fixed; bottom: 0; left: 0; width: 20px; height: 20px; opacity: 0.02; cursor: pointer;" title="Admin"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    document.getElementById('adminLink').addEventListener('click', function() {
      window.location.href = 'admin.html';
    });
    function renderCart() {
      const {items, total} = getCartItems();
      const container = document.getElementById('cart-container');
      if (items.length === 0) {
        container.innerHTML = '<p>কার্টে কোন পণ্য নেই।</p>';
        updateCartCount();
        return;
      }
      let html = '<div class="table-responsive"><table class="table table-striped"><thead><tr><th>পণ্য</th><th>মূল্য</th><th>পরিমাণ</th><th>সাবটোটাল</th><th>অ্যাকশন</th></tr></thead><tbody>';
      items.forEach(item => {
        // Use the first package price as base price for cart display
        const price = item.product.packages && item.product.packages.length > 0 ? item.product.packages[0].price : 0;
        html += `<tr>
            <td>${item.product.name}</td>
            <td>৳ ${price.toFixed(0)}</td>
            <td><input type="number" min="1" value="${item.quantity}" class="form-control form-control-sm" style="width:80px;" onchange="updateCartQuantity(${item.product.id}, this.value)"></td>
            <td>৳ ${(price * item.quantity).toFixed(0)}</td>
            <td><button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.product.id})">মুছুন</button></td>
          </tr>`;
      });
      html += `</tbody></table><div class="text-end"><h4>মোট: ৳ ${total.toFixed(0)}</h4><button class="btn btn-success" onclick="placeOrder()">অর্ডার করুন</button></div></div>`;
      container.innerHTML = html;
      updateCartCount();
    }

    function updateCartQuantity(productId, quantity) {
      const cart = getCart();
      if (cart[productId]) {
        cart[productId] = parseInt(quantity) || 1;
        saveCart(cart);
        renderCart();
      }
    }

    function removeFromCart(productId) {
      const cart = getCart();
      delete cart[productId];
      saveCart(cart);
      renderCart();
    }

    function placeOrder() {
      alert('আপনার অর্ডার গ্রহণ করা হয়েছে!');
      localStorage.removeItem('cart');
      renderCart();
    }

    // Initialize
    renderCart();
  </script>
</body>
</html>
